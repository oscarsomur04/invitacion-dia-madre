<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Día de la Madre</title>

<style>
body{
  margin:0;
  font-family:'Georgia', serif;
  background:linear-gradient(135deg,#fce4ec,#f8bbd0);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* TARJETA */
.card{
  width:92%;
  max-width:420px;
  background:white;
  border-radius:25px;
  padding:30px 20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
  text-align:center;
}

/* TITULO */
.titulo{
  font-size:26px;
  letter-spacing:2px;
  margin-bottom:10px;
}

/* SUBTITULO */
.subtitulo{
  font-size:14px;
  color:#b76e79;
  line-height:1.5;
}

/* INFO */
.info{
  margin:15px 0;
  font-size:16px;
  font-weight:500;
}

/* MENSAJE */
.mensaje{
  font-size:14px;
  color:#555;
}

/* FRASES */
.fraseBox{
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  background:#fff0f5;
}

#frase{
  font-size:15px;
  color:#c2185b;
  font-style:italic;
  min-height:80px;
}

/* CORAZONES DECORATIVOS */
.corazon{
  position:absolute;
  width:8px;
  height:8px;
  background:#ff4d6d;
  transform:rotate(45deg);
  opacity:0.3;
  animation:subir 6s infinite;
}

.corazon:before,
.corazon:after{
  content:"";
  position:absolute;
  width:8px;
  height:8px;
  background:#ff4d6d;
  border-radius:50%;
}

.corazon:before{ top:-4px;}
.corazon:after{ left:-4px;}

.c1{ left:20%; bottom:0;}
.c2{ left:70%; bottom:0;}

@keyframes subir{
  0%{transform:translateY(0); opacity:0;}
  50%{opacity:0.4;}
  100%{transform:translateY(-300px); opacity:0;}
}
</style>
</head>

<body>

<div class="corazon c1"></div>
<div class="corazon c2"></div>

<div class="card">

<h1 class="titulo">Día de la Madre</h1>

<p class="subtitulo">
El personal masculino del Complejo Educativo Católico Santo Domingo<br>
tiene el honor de invitarles
</p>

<p class="info">📅 8 de mayo · ⏰ 5:00 PM</p>

<p class="mensaje">
A una velada especial dedicada a celebrar el amor, la entrega y la grandeza de cada madre.
</p>

<div class="fraseBox">
<p id="frase"></p>
</div>

</div>

<script>
const frases = [
"Madre, tu amor no conoce límites ni condiciones. En cada sacrificio silencioso construyes un mundo lleno de paz y esperanza 💖",
"Eres el reflejo más puro del amor verdadero, enseñándonos cada día el valor de la entrega y la ternura infinita 🌸",
"Tu amor transforma lo simple en extraordinario y convierte cada momento en un recuerdo eterno 💐",
"En tu abrazo encontramos refugio, en tu voz dirección y en tu amor la fuerza para seguir adelante ✨"
];

let i = 0;
let j = 0;

function escribir(){
  const el = document.getElementById("frase");

  if(j < frases[i].length){
    el.textContent += frases[i][j];
    j++;
    setTimeout(escribir, 40);
  } else {
    setTimeout(() => {
      el.textContent = "";
      j = 0;
      i = (i + 1) % frases.length;
      escribir();
    }, 2500);
  }
}

window.onload = escribir;
</script>

</body>
</html>
