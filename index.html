<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Día de la Madre</title>

<style>
body{
  margin:0;
  font-family:'Georgia', serif;
  background:linear-gradient(135deg,#fff,#fdeff4);
}

.container{
  text-align:center;
  padding:70px 20px;
  max-width:700px;
  margin:auto;
  position:relative;
}

.titulo{
  font-size:38px;
  letter-spacing:3px;
  animation:fadeUp 1.5s ease;
}

.subtitulo{
  color:#b76e79;
  margin-top:10px;
  line-height:1.6;
  animation:fadeUp 2s ease;
}

.info{
  margin-top:20px;
  font-size:18px;
}

.mensaje{
  margin-top:15px;
  color:#555;
}

.fraseBox{
  margin-top:30px;
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,0.9);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

#frase{
  font-size:18px;
  color:#b03060;
  font-style:italic;
  min-height:100px;
}

/* ANIMACIONES */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* CORAZONES */
.corazon{
  position:absolute;
  width:16px;
  height:16px;
  background:#ff4d6d;
  transform:rotate(45deg);
  animation:subir 7s infinite;
}

.corazon:before,
.corazon:after{
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  background:#ff4d6d;
  border-radius:50%;
}

.corazon:before{ top:-8px;}
.corazon:after{ left:-8px;}

.c1{ left:15%; bottom:-20px;}
.c2{ left:80%; bottom:-20px; animation-delay:3s;}

@keyframes subir{
  0%{transform:translateY(0) rotate(45deg); opacity:0;}
  30%{opacity:1;}
  100%{transform:translateY(-600px) rotate(45deg); opacity:0;}
}

/* PETALOS */
.petalo{
  position:absolute;
  width:14px;
  height:14px;
  background:radial-gradient(circle,#ffb6c1,#ff69b4);
  border-radius:50%;
  animation:caer 10s linear infinite;
}

.p1{left:20%;}
.p2{left:60%; animation-delay:3s;}
.p3{left:80%; animation-delay:6s;}

@keyframes caer{
  0%{transform:translateY(-50px);}
  100%{transform:translateY(700px);}
}
</style>
</head>

<body>

<div class="container">

<div class="petalo p1"></div>
<div class="petalo p2"></div>
<div class="petalo p3"></div>

<div class="corazon c1"></div>
<div class="corazon c2"></div>

<h1 class="titulo">Día de la Madre</h1>

<p class="subtitulo">
El personal masculino del Complejo Educativo Católico Santo Domingo<br>
tiene el honor de invitarles
</p>

<p class="info">📅 8 de mayo · ⏰ 5:00 PM</p>

<p class="mensaje">
A una velada especial dedicada a celebrar el amor, la entrega y la grandeza de cada madre.
</p>

<div class="fraseBox">
<p id="frase"></p>
</div>

</div>

<script>
const frases = [
"Madre, tu amor no conoce límites ni condiciones. En cada sacrificio silencioso construyes un mundo lleno de paz y esperanza 💖",
"Eres el reflejo más puro del amor verdadero, enseñándonos cada día el valor de la entrega y la ternura infinita 🌸",
"Tu amor transforma lo simple en extraordinario y convierte cada momento en un recuerdo eterno 💐",
"En tu abrazo encontramos refugio, en tu voz dirección y en tu amor la fuerza para seguir adelante ✨",
"Madre, eres la raíz que sostiene nuestras vidas y la luz que ilumina cada uno de nuestros caminos 💕",
"Tu amor es silencioso pero inmenso, invisible pero eterno, y siempre presente en cada paso que damos 🌷"
];

let i = 0;
let j = 0;

function escribir(){
  const el = document.getElementById("frase");

  if(j < frases[i].length){
    el.textContent += frases[i][j];
    j++;
    setTimeout(escribir, 30);
  } else {
    setTimeout(() => {
      el.textContent = "";
      j = 0;
      i = (i + 1) % frases.length;
      escribir();
    }, 2500);
  }
}

window.onload = escribir;
</script>

</body>
</html>
