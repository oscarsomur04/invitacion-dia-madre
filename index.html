<div style="font-family: 'Georgia', serif; text-align:center; padding:90px 20px; background:linear-gradient(135deg,#fff,#fdeff4); border-radius:20px; max-width:700px; margin:auto; position:relative; overflow:hidden; box-shadow:0 15px 40px rgba(0,0,0,0.08);">

  <!-- FLORES Y CORAZONES -->
  <div class="petalo p1"></div>
  <div class="petalo p2"></div>
  <div class="petalo p3"></div>

  <div class="corazon c1"></div>
  <div class="corazon c2"></div>

  <h1 class="titulo">Día de la Madre</h1>

  <p class="subtitulo">
    El personal masculino del Complejo Educativo Católico Santo Domingo<br>
    tiene el honor de invitarles
  </p>

  <p class="info">
    📅 8 de mayo · ⏰ 5:00 PM
  </p>

  <p class="mensaje">
    A una velada especial dedicada a celebrar el amor, la entrega y la grandeza de cada madre.
  </p>

  <div class="fraseBox">
    <p id="frase"></p>
  </div>

</div>

<style>

/* TITULO */
.titulo{
  font-size:42px;
  font-weight:300;
  letter-spacing:4px;
  animation:fadeUp 1.5s ease;
}

/* SUB */
.subtitulo{
  color:#b76e79;
  margin-top:15px;
  line-height:1.6;
  font-size:17px;
  animation:fadeUp 2s ease;
}

/* INFO */
.info{
  margin-top:25px;
  font-size:20px;
}

/* MENSAJE */
.mensaje{
  margin-top:20px;
  color:#555;
}

/* FRASES */
.fraseBox{
  margin-top:40px;
  padding:30px;
  border-radius:18px;
  background:rgba(255,255,255,0.85);
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

#frase{
  font-size:19px;
  color:#b03060;
  font-style:italic;
  font-weight:500;
  min-height:120px;
}

/* ANIMACION TEXTO */
.escribir{
  border-right:2px solid #b03060;
  white-space:nowrap;
  overflow:hidden;
  animation:blink 0.7s infinite;
}

@keyframes blink{
  0%{border-color:transparent;}
  50%{border-color:#b03060;}
  100%{border-color:transparent;}
}

/* ENTRADA */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* CORAZONES */
.corazon{
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4d6d;
  transform:rotate(45deg);
  animation:subir 7s infinite;
}

.corazon:before,
.corazon:after{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4d6d;
  border-radius:50%;
}

.corazon:before{ top:-9px; left:0;}
.corazon:after{ left:-9px; top:0;}

.c1{ left:15%; bottom:-30px; animation-delay:0s;}
.c2{ left:75%; bottom:-30px; animation-delay:3s;}

/* FLORES */
.petalo{
  position:absolute;
  width:20px;
  height:20px;
  background:radial-gradient(circle,#ffb6c1,#ff69b4);
  border-radius:50% 50% 50% 0;
  transform:rotate(45deg);
  opacity:0.6;
  animation:caer 10s infinite linear;
}

.p1{ left:20%; top:-20px;}
.p2{ left:60%; top:-40px; animation-delay:3s;}
.p3{ left:80%; top:-30px; animation-delay:6s;}

/* MOVIMIENTO */
@keyframes subir{
  0%{ transform:translateY(0) rotate(45deg); opacity:0;}
  30%{ opacity:1;}
  100%{ transform:translateY(-600px) rotate(45deg); opacity:0;}
}

@keyframes caer{
  0%{ transform:translateY(0) rotate(45deg);}
  100%{ transform:translateY(700px) rotate(360deg);}
}

</style>

<script>
const frases = [
"Madre, tu amor no conoce límites ni condiciones. En cada sacrificio silencioso construyes un mundo lleno de paz y esperanza 💖",
"Eres el reflejo más puro del amor verdadero, enseñándonos cada día el valor de la entrega y la ternura infinita 🌸",
"Tu amor transforma lo simple en extraordinario y convierte cada momento en un recuerdo eterno 💐",
"En tu abrazo encontramos refugio, en tu voz dirección y en tu amor la fuerza para seguir adelante ✨",
"Madre, eres la raíz que sostiene nuestras vidas y la luz que ilumina cada uno de nuestros caminos 💕",
"Tu amor es silencioso pero inmenso, invisible pero eterno, y siempre presente en cada paso que damos 🌷",
"Gracias por enseñarnos que el amor verdadero no se dice, se demuestra cada día con acciones 💖",
"Tu corazón es tan grande que siempre hay espacio para dar más amor, incluso cuando parece imposible 🌸",
"Todo lo que somos tiene una parte de ti, porque tu amor ha sido nuestra base y nuestra inspiración 💐",
"Madre, eres el hogar al que siempre queremos volver, sin importar dónde estemos ✨"
];

let i = 0;
let j = 0;
let textoActual = "";
let escribiendo = true;

function escribirTexto(){
  const fraseElemento = document.getElementById("frase");

  if(escribiendo){
    if(j < frases[i].length){
      textoActual += frases[i].charAt(j);
      fraseElemento.innerHTML = textoActual + "|";
      j++;
      setTimeout(escribirTexto, 40);
    } else {
      escribiendo = false;
      setTimeout(escribirTexto, 2500);
    }
  } else {
    textoActual = "";
    j = 0;
    i = (i + 1) % frases.length;
    escribiendo = true;
    setTimeout(escribirTexto, 500);
  }
}

escribirTexto();
</script>
